<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="FlatFinderIL — недвижимость Израиля. Скоро открытие.">
  <title>FlatFinderIL — Скоро открытие</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1b2a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 32px;
    }

    /* LOGO */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo-mark {
      width: 80px;
      height: 80px;
      background: #1a73e8;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 8px 32px rgba(26, 115, 232, 0.45);
    }

    .logo-name {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-name span {
      color: #1a73e8;
    }

    .logo-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: -4px;
    }

    /* TAGLINE */
    .tagline {
      text-align: center;
    }

    .tagline h1 {
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1.15;
    }

    .tagline p {
      margin-top: 12px;
      font-size: 15px;
      color: rgba(255,255,255,0.45);
    }

    /* BOT BUTTON */
    .bot-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #1a73e8;
      color: #fff;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(26,115,232,0.4);
    }

    .bot-btn:hover {
      background: #0d5cc7;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(26,115,232,0.5);
    }

    .bot-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* FOOTER */
    .footer {
      position: fixed;
      bottom: 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: .3px;
    }

    @media (max-width: 480px) {
      .tagline h1 { font-size: 30px; }
      .logo-name  { font-size: 26px; }
      .logo-mark  { width: 64px; height: 64px; font-size: 20px; }
    }
  </style>
</head>
<body>

  <!-- LOGO -->
  <div class="logo">
    <div class="logo-mark">FF</div>
    <div class="logo-name">Flat<span>Finder</span>IL</div>
    <div class="logo-sub">Недвижимость Израиля</div>
  </div>

  <!-- TAGLINE -->
  <div class="tagline">
    <h1>Скоро открытие</h1>
    <p>Портал о рынке недвижимости Израиля — уже совсем скоро</p>
  </div>

  <!-- BOT LINK -->
  <a href="https://t.me/flatfinderil_bot" target="_blank" class="bot-btn">
    <!-- Telegram icon -->
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Открыть бот @flatfinderil_bot
  </a>

  <div class="footer">© 2026 FlatFinderIL · flatfinderil.com</div>

</body>
</html>
